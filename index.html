                    </div>
                    <button onClick={() => setShowPasswordModal(true)} className="absolute bottom-4 text-gray-300 hover:text-gray-400 transition-colors p-4">
                        <i className="fa-solid fa-lock text-lg"></i>
                    </button>
                </div>
            );

            const renderStep = () => {
                if (step === 0) return renderLanguage();

                return (
                    <div className="flex flex-col h-screen bg-[#F2F2F7] max-w-2xl mx-auto relative fade-in">
                        <div className="pt-12 pb-4 px-6 border-b border-gray-200/50 flex items-center justify-between glass-panel sticky top-0 z-10">
                            {step > 1 && step < 11 ? (
                                <button onClick={prevStep} className="text-[#007AFF] text-[17px] font-medium active:opacity-50 transition-opacity flex items-center">
                                    <i className="fa-solid fa-chevron-left mr-2"></i> {lang === 'kz' ? 'Артқа' : 'Назад'}
                                </button>
                            ) : <div></div>}
                            <span className="text-sm font-semibold text-gray-400">
                                {step > 1 && step < 10 ? `${step - 1} ${lang === 'kz' ? 'дан 8' : 'из 8'}` : ''}
                            </span>
                        </div>

                        <div className="flex-1 overflow-y-auto px-6 py-8">
                            {step === 1 && (
                                <div className="space-y-6 fade-in h-full flex flex-col justify-center pb-20">
                                    <div className="w-20 h-20 bg-white rounded-[24px] shadow-sm flex items-center justify-center text-[#007AFF] text-3xl mb-4">
                                        <i className="fa-solid fa-feather"></i>
                                    </div>
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.welcomeTitle}</h2>
                                    <p className="text-[#1D1D1F] text-[19px] leading-relaxed font-medium">{t.welcomeDesc}</p>
                                    <p className="text-gray-500 text-[17px] leading-relaxed bg-white p-5 rounded-[20px] shadow-sm">{t.welcomeDetails}</p>
                                </div>
                            )}

                            {step === 2 && (
                                <div className="space-y-6 fade-in">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.contactsTitle}</h2>
                                    <div className="space-y-5 bg-white p-6 rounded-[24px] shadow-sm">
                                        <div>
                                            <label className="block text-[15px] font-semibold text-gray-500 mb-2">{t.nameLabel}</label>
                                            <input type="text" className="ios-input bg-gray-50" value={formData.name} onChange={e => handleInputChange('name', e.target.value)} placeholder="Имя / Есіміңіз"/>
                                        </div>
                                        <div>
                                            <label className="block text-[15px] font-semibold text-gray-500 mb-2">{t.phoneLabel}</label>
                                            <input type="tel" className="ios-input bg-gray-50" value={formData.phone} onChange={e => handleInputChange('phone', e.target.value)} placeholder="+7 (707) 123-4567"/>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {step === 3 && (
                                <div className="space-y-6 fade-in">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.healthTitle}</h2>
                                    <p className="text-gray-500 text-[17px] leading-relaxed px-1">{t.healthDesc}</p>
                                    <textarea className="ios-input bg-white shadow-sm min-h-[160px] resize-none" value={formData.health} onChange={e => handleInputChange('health', e.target.value)} placeholder="..."></textarea>
                                </div>
                            )}

                            {step === 4 && (
                                <div className="space-y-6 fade-in">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.relTitle}</h2>
                                    <p className="text-gray-500 text-[17px] leading-relaxed px-1">{t.relDesc}</p>
                                    <textarea className="ios-input bg-white shadow-sm min-h-[160px] resize-none" value={formData.relationships} onChange={e => handleInputChange('relationships', e.target.value)} placeholder="..."></textarea>
                                </div>
                            )}

                            {step === 5 && (
                                <div className="space-y-6 fade-in">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.moneyTitle}</h2>
                                    <p className="text-gray-500 text-[17px] leading-relaxed px-1">{t.moneyDesc}</p>
                                    <textarea className="ios-input bg-white shadow-sm min-h-[160px] resize-none" value={formData.money} onChange={e => handleInputChange('money', e.target.value)} placeholder="..."></textarea>
                                </div>
                            )}

                            {step === 6 && (
                                <div className="space-y-6 fade-in">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.selfTitle}</h2>
                                    <p className="text-gray-500 text-[17px] leading-relaxed px-1">{t.selfDesc}</p>
                                    <textarea className="ios-input bg-white shadow-sm min-h-[160px] resize-none" value={formData.selfEsteem} onChange={e => handleInputChange('selfEsteem', e.target.value)} placeholder="..."></textarea>
                                </div>
                            )}

                            {step === 7 && (
                                <div className="space-y-6 fade-in pb-10">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.timeTitle}</h2>
                                    <p className="text-gray-500 text-[17px] leading-relaxed px-1">{t.timeDesc}</p>
                                    <div className="bg-white rounded-[24px] shadow-sm overflow-hidden flex flex-col">
                                        {t.timeOptions.map((opt, index) => (
                                            <button key={opt} onClick={() => handleInputChange('time', opt)} className={`w-full text-left px-6 py-4 font-medium text-[17px] transition-colors flex justify-between items-center ${index !== t.timeOptions.length - 1 ? 'border-b border-gray-100' : ''} ${formData.time === opt ? 'bg-blue-50/50 text-[#007AFF]' : 'text-[#1D1D1F] hover:bg-gray-50'}`}>
                                                {opt}
                                                {formData.time === opt && <i className="fa-solid fa-check text-[#007AFF]"></i>}
                                            </button>
                                        ))}
                                    </div>
                                    {(formData.time === 'Свой вариант' || formData.time === 'Өз нұсқам') && (
                                        <div className="fade-in mt-4">
                                            <input type="text" className="ios-input bg-white shadow-sm" placeholder={t.customOptionPlace} value={formData.customTime} onChange={e => handleInputChange('customTime', e.target.value)} />
                                        </div>
                                    )}
                                </div>
                            )}

                            {step === 8 && (
                                <div className="space-y-6 fade-in">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.situationTitle}</h2>
                                    <p className="text-gray-500 text-[17px] leading-relaxed px-1">{t.situationDesc}</p>
                                    <textarea className="ios-input bg-white shadow-sm min-h-[160px] resize-none" value={formData.situation} onChange={e => handleInputChange('situation', e.target.value)} placeholder="..."></textarea>
                                </div>
                            )}

                            {step === 9 && (
                                <div className="space-y-6 fade-in pb-20">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.emotionsTitle}</h2>
                                    <p className="text-gray-500 text-[17px] leading-relaxed px-1">{t.emotionsDesc}</p>
                                    <div className="flex flex-wrap gap-3 mb-4">
                                        {t.emotionOptions.map(emo => (
                                            <button key={emo} onClick={() => toggleEmotion(emo)} className={`px-5 py-3 rounded-full font-medium transition-all shadow-sm border ${formData.emotions.includes(emo) ? 'bg-[#007AFF] text-white border-[#007AFF]' : 'bg-white text-[#1D1D1F] border-transparent hover:border-gray-200'}`}>
                                                {emo}
                                            </button>
                                        ))}
                                    </div>
                                    <input type="text" className="ios-input bg-white shadow-sm" placeholder={t.customOptionPlace} value={formData.customEmotion} onChange={e => handleInputChange('customEmotion', e.target.value)} />
                                </div>
                            )}
                        </div>

                        {step > 0 && step < 10 && (
                            <div className="p-6 glass-panel border-t border-gray-200/50 pb-8 absolute bottom-0 left-0 right-0 z-20">
                                <button onClick={step === 9 ? generateReport : nextStep} className="w-full py-4 bg-[#007AFF] text-white rounded-[20px] font-semibold text-[17px] active:scale-95 transition-transform shadow-lg shadow-blue-500/30 flex justify-center items-center">
                                    {step === 9 ? t.analyzeBtn : (step === 1 ? t.startBtn : t.nextBtn)}
                                </button>
                            </div>
                        )}
                        
                        {step === 10 && isLoading && (
                            <div className="absolute inset-0 bg-[#F2F2F7] z-50 flex flex-col items-center justify-center space-y-8 fade-in">
                                <div className="w-16 h-16 border-4 border-gray-200 border-t-[#007AFF] rounded-full animate-spin"></div>
                                <p className="text-[17px] text-gray-500 font-medium animate-pulse text-center px-8">{t.analyzingText}</p>
                            </div>
                        )}

                        {step === 10 && !isLoading && reportHtml && (
                            <div className="absolute inset-0 bg-[#F2F2F7] z-40 flex flex-col fade-in">
                                <div className="pt-14 pb-4 px-6 border-b border-gray-200/50 glass-panel sticky top-0 z-10 text-center">
                                    <h2 className="text-[20px] font-bold text-[#1D1D1F] tracking-tight">{t.resultTitle}</h2>
                                    <p className="text-[15px] text-gray-500 font-medium mt-1">{formData.name} ({formData.phone})</p>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto px-6 pt-6 pb-64">
                                    <div className="bg-white rounded-[24px] p-6 shadow-sm custom-markdown" dangerouslySetInnerHTML={{ __html: reportHtml }}></div>
                                </div>

                                <div className="absolute bottom-0 left-0 right-0 p-4 glass-panel border-t border-gray-200/50 pb-6 z-20 space-y-3">
                                    <div className="grid grid-cols-2 gap-3">
                                        {/* Кнопка отзыва */}
                                        {reviewSubmitted ? (
                                            <div className="flex items-center justify-center py-3.5 bg-gray-100 text-green-600 rounded-xl font-bold text-[14px] shadow-sm text-center px-2">
                                                <i className="fa-solid fa-check-circle mr-1.5"></i>
                                                <span>{t.reviewSent}</span>
                                            </div>
                                        ) : (
                                            <button onClick={() => { trackButtonClick('Отзыв'); setShowReviewModal(true); }}
                                               className="flex items-center justify-center py-3.5 bg-[#FFCC00] text-gray-900 rounded-xl font-bold text-[14px] shadow-sm active:scale-95 transition-all text-center px-2">
                                                <i className="fa-solid fa-star mr-1.5"></i>
                                                <span>{t.reviewBtn}</span>
                                            </button>
                                        )}
                                        
                                        {/* Кнопка уроков */}
                                        <a href={LINK_LESSONS} onClick={(e) => { e.preventDefault(); trackButtonClick('Бесплатные уроки', LINK_LESSONS); }}
                                           className="flex items-center justify-center py-3.5 bg-[#007AFF] text-white rounded-xl font-bold text-[14px] shadow-sm active:scale-95 transition-all text-center px-2">
                                            <i className="fa-brands fa-telegram mr-1.5 text-lg"></i>
                                            <span>{t.lessonsBtn}</span>
                                        </a>
                                    </div>
                                    
                                    {/* Кнопка консультации */}
                                    <a href={LINK_CONSULTATION} onClick={(e) => { e.preventDefault(); trackButtonClick('Консультация', LINK_CONSULTATION); }}
                                       className="flex items-center justify-center w-full py-4 bg-[#34C759] text-white rounded-[18px] font-bold text-[16px] shadow-md shadow-green-500/20 active:scale-95 transition-all text-center">
                                        <i className="fa-solid fa-calendar-check mr-2 text-lg"></i>
                                        <span>{t.consultBtn}</span>
                                    </a>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            if (showAdmin) {
                return (
                    <div className="min-h-screen bg-gray-900 text-white p-6 fade-in">
                        <div className="flex justify-between items-center mb-8">
                            <h1 className="text-2xl font-bold">База данных анкет</h1>
                            <button onClick={() => setShowAdmin(false)} className="px-4 py-2 bg-gray-800 rounded-lg text-sm">Выйти</button>
                        </div>
                        {db.length === 0 ? (
                            <p className="text-gray-400">Нет данных</p>
                        ) : (
                            <div className="space-y-6 pb-20">
                                {db.slice().reverse().map((record, index) => (
                                    <div key={index} className="bg-gray-800 rounded-xl p-5 border border-gray-700">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <h3 className="text-lg font-bold">{record.name}</h3>
                                                <p className="text-green-400 font-mono mt-1">{record.phone}</p>
                                            </div>
                                            <span className="text-xs text-gray-500">{record.date}</span>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-gray-300 mb-4 bg-gray-900 p-4 rounded-lg border border-gray-700">
                                            <div className="space-y-2">
                                                <p><span className="text-gray-500 font-semibold block">Здоровье:</span> {record.health || '-'}</p>
                                                <p><span className="text-gray-500 font-semibold block">Отношения:</span> {record.relationships || '-'}</p>
                                                <p><span className="text-gray-500 font-semibold block">Деньги:</span> {record.money || '-'}</p>
                                                <p><span className="text-gray-500 font-semibold block">Самооценка:</span> {record.selfEsteem || '-'}</p>
                                            </div>
                                            <div className="space-y-2">
                                                <p><span className="text-gray-500 font-semibold block">Давность:</span> {(record.time === 'Свой вариант' || record.time === 'Өз нұсқам') ? record.customTime : (record.time || '-')}</p>
                                                <p><span className="text-gray-500 font-semibold block">Ситуация:</span> {record.situation || '-'}</p>
                                                <p><span className="text-gray-500 font-semibold block">Эмоции:</span> {record.emotions?.join(', ')} {record.customEmotion ? `(${record.customEmotion})` : ''}</p>
                                                <p><span className="text-gray-500 font-semibold block">Нажатые кнопки:</span> 
                                                    {record.clickedButtons?.length > 0 ? (
                                                        <span className="text-blue-400 font-medium">{record.clickedButtons.join(' ➔ ')}</span>
                                                    ) : (
                                                        <span className="text-gray-600">Не нажимал(а)</span>
                                                    )}
                                                </p>
                                            </div>
                                        </div>
                                        
                                        {/* Блок с отзывом клиента в админке */}
                                        {record.review && (
                                            <div className="mb-4 p-4 bg-gray-900 border border-[#FFCC00]/30 rounded-lg text-sm text-yellow-500">
                                                <div className="flex items-center mb-2">
                                                    <i className="fa-solid fa-star text-[#FFCC00] mr-2"></i>
                                                    <strong className="text-white">Отзыв клиента:</strong>
                                                </div>
                                                <p className="italic">«{record.review}»</p>
                                            </div>
                                        )}

                                        {/* Скрытый блок с полной расшифровкой */}
                                        {record.result && (
                                            <details className="mt-2 group">
                                                <summary className="text-blue-400 cursor-pointer text-sm font-semibold outline-none hover:text-blue-300 transition-colors">
                                                    Показать полную расшифровку
                                                </summary>
                                                <div className="mt-3 bg-white text-black p-5 rounded-xl text-sm max-h-96 overflow-y-auto custom-markdown border-2 border-gray-600 shadow-inner" dangerouslySetInnerHTML={{ __html: record.result }}>
                                                </div>
                                            </details>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <>
                    {renderStep()}
                    
                    {/* Модальное окно Входа в Админку */}
                    {showPasswordModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                                <h3 className="text-[20px] font-bold text-center mb-4 text-black">Вход в админку</h3>
                                <input type="password" className="ios-input bg-gray-50 w-full mb-4 text-black" placeholder="Введите пароль" value={passwordInput} onChange={e => setPasswordInput(e.target.value)}/>
                                <div className="flex space-x-3">
                                    <button onClick={() => setShowPasswordModal(false)} className="flex-1 py-3 bg-gray-100 rounded-xl font-semibold text-gray-600">Отмена</button>
                                    <button onClick={handlePasswordSubmit} className="flex-1 py-3 bg-[#007AFF] text-white rounded-xl font-semibold">Войти</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Модальное окно Оставления Отзыва */}
                    {showReviewModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4 fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                                <div className="flex justify-center mb-3">
                                    <i className="fa-solid fa-star text-4xl text-[#FFCC00]"></i>
                                </div>
                                <h3 className="text-[20px] font-bold text-center mb-4 text-black">
                                    {lang === 'kz' ? 'Пікір қалдыру' : 'Оставить отзыв'}
                                </h3>
                                <textarea 
                                    className="ios-input bg-gray-50 w-full mb-4 text-black min-h-[120px] resize-none" 
                                    placeholder={lang === 'kz' ? 'Талдау туралы өз ойыңызбен бөлісіңіз...' : 'Поделитесь впечатлениями о разборе...'} 
                                    value={reviewInput} 
                                    onChange={e => setReviewInput(e.target.value)}
                                ></textarea>
                                <div className="flex space-x-3">
                                    <button onClick={() => setShowReviewModal(false)} className="flex-1 py-3 bg-gray-100 rounded-xl font-semibold text-gray-600">
                                        {lang === 'kz' ? 'Болдырмау' : 'Отмена'}
                                    </button>
                                    <button onClick={submitReview} className="flex-1 py-3 bg-[#FFCC00] text-gray-900 rounded-xl font-semibold shadow-md">
                                        {lang === 'kz' ? 'Жіберу' : 'Отправить'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
