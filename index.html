<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PsychoBot - Поиск первопричины</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #F2F2F7;
            -webkit-tap-highlight-color: transparent;
        }

        .ios-input {
            width: 100%;
            background: #F2F2F7;
            border: 1px solid transparent;
            border-radius: 16px;
            padding: 16px;
            font-size: 17px;
            color: #1D1D1F;
            transition: all 0.2s ease;
        }

        .ios-input:focus {
            outline: none;
            background: #FFFFFF;
            border-color: #007AFF;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Стили для сгенерированного текста (Markdown) */
        .markdown-body h3 { font-size: 20px; font-weight: 700; margin-top: 24px; margin-bottom: 12px; color: #1D1D1F; }
        .markdown-body p { font-size: 17px; line-height: 1.6; color: #3A3A3C; margin-bottom: 16px; }
        .markdown-body strong { color: #1D1D1F; font-weight: 600; }
        .markdown-body ul { list-style-type: disc; padding-left: 20px; margin-bottom: 16px; }
        .markdown-body li { font-size: 17px; color: #3A3A3C; margin-bottom: 8px; }
        .markdown-body blockquote { border-left: 4px solid #007AFF; padding-left: 16px; color: #007AFF; font-style: italic; background: #F0F8FF; padding: 12px 16px; border-radius: 0 12px 12px 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const WHATSAPP_NUMBER = "77076151515";

        function App() {
            const [step, setStep] = React.useState(0);
            const [lang, setLang] = React.useState(null);
            const [isLoading, setIsLoading] = React.useState(false);
            const [aiResult, setAiResult] = React.useState('');
            const [showAdmin, setShowAdmin] = React.useState(false);
            const [showPasswordModal, setShowPasswordModal] = React.useState(false);
            const [passwordInput, setPasswordInput] = React.useState('');
            const [db, setDb] = React.useState([]);

            const [formData, setFormData] = React.useState({
                name: '',
                phone: '',
                health: '',
                relationships: '',
                money: '',
                selfEsteem: '',
                time: '',
                customTime: '',
                situation: '',
                emotions: [],
                customEmotion: ''
            });

            React.useEffect(() => {
                const savedDb = localStorage.getItem('psychoBotDB');
                if (savedDb) setDb(JSON.parse(savedDb));
            }, []);

            const translations = {
                ru: {
                    chooseLang: "Выберите язык",
                    welcomeTitle: "О тесте",
                    welcomeDesc: "Узнайте истинные причины ваших состояний в сфере здоровья, отношений, денег и духовности.",
                    welcomeDetails: "Этот тест проанализирует ваши ответы и покажет психосоматику ваших проблем. В конце вы получите глубокую расшифровку.",
                    startBtn: "Начать тест",
                    contactsTitle: "Давайте познакомимся",
                    nameLabel: "Как к вам обращаться?",
                    phoneLabel: "Ваш номер телефона",
                    nextBtn: "Продолжить",
                    healthTitle: "Здоровье",
                    healthDesc: "Опишите вашу проблему со здоровьем (например: псориаз, частые мигрени, боли в спине). Если проблем нет, напишите «Нет проблем».",
                    relTitle: "Отношения",
                    relDesc: "Опишите вашу проблему (например: конфликты, одиночество, непонимание). Если нет, напишите «Нет проблем».",
                    moneyTitle: "Деньги и карьера",
                    moneyDesc: "Опишите проблему (например: долги, не могу пробить потолок, выгорание).",
                    selfTitle: "Самооценка и духовность",
                    selfDesc: "Опишите проблему (например: синдром самозванца, неприятие себя, апатия, потеря смысла).",
                    timeTitle: "Как давно это было?",
                    timeDesc: "Укажите, как давно вы живете с этой проблемой.",
                    timeOptions: ["Недавно", "Полгода", "1 год", "3-5 лет", "Больше 5 лет", "С детства", "Свой вариант"],
                    situationTitle: "Ситуация",
                    situationDesc: "Какая ситуация произошла в вашей жизни, когда появилась эта проблема? Опишите откровенно.",
                    emotionsTitle: "Эмоции",
                    emotionsDesc: "Что вы чувствовали в тот момент?",
                    emotionOptions: ["Страх", "Гнев", "Обида", "Вина", "Стыд", "Одиночество", "Беспомощность", "Разочарование"],
                    customOptionPlace: "Свой вариант...",
                    analyzeBtn: "Получить разбор",
                    analyzingText: "Искусственный интеллект анализирует вашу первопричину...",
                    resultTitle: "Ваш разбор",
                    ctaBtn: "Записаться на консультацию"
                },
                kz: {
                    chooseLang: "Тілді таңдаңыз",
                    welcomeTitle: "Тест туралы",
                    welcomeDesc: "Денсаулық, қарым-қатынас, қаржы және руханият саласындағы жағдайыңыздың нағыз себептерін біліңіз.",
                    welcomeDetails: "Бұл тест сіздің жауаптарыңызды талдап, мәселелеріңіздің психосоматикасын көрсетеді. Соңында толық сипаттама аласыз.",
                    startBtn: "Тестті бастау",
                    contactsTitle: "Танысайық",
                    nameLabel: "Есіміңіз кім?",
                    phoneLabel: "Телефон нөміріңіз",
                    nextBtn: "Жалғастыру",
                    healthTitle: "Денсаулық",
                    healthDesc: "Мәселеңізді сипаттаңыз (мысалы: псориаз, жиі бас ауруы). Егер мәселе жоқ болса, «Мәселе жоқ» деп жазыңыз.",
                    relTitle: "Қарым-қатынас",
                    relDesc: "Мәселеңізді сипаттаңыз (мысалы: ұрыс-керіс, жалғыздық). Жоқ болса, «Мәселе жоқ» деп жазыңыз.",
                    moneyTitle: "Ақша және карьера",
                    moneyDesc: "Мәселені сипаттаңыз (мысалы: қарыздар, табыс көлемін асыра алмау).",
                    selfTitle: "Өзін-өзі бағалау және руханият",
                    selfDesc: "Мәселені сипаттаңыз (мысалы: өзін мойындамау, апатия, өмір мәнін жоғалту).",
                    timeTitle: "Бұл қашан болды?",
                    timeDesc: "Бұл мәселемен қанша уақыт өмір сүріп келесіз?",
                    timeOptions: ["Жақында", "Жарты жыл", "1 жыл", "3-5 жыл", "5 жылдан астам", "Бала кезден", "Өз нұсқам"],
                    situationTitle: "Жағдай",
                    situationDesc: "Бұл мәселе пайда болған кезде өміріңізде қандай жағдай болды? Ашық жазыңыз.",
                    emotionsTitle: "Эмоциялар",
                    emotionsDesc: "Сол сәтте не сезіндіңіз?",
                    emotionOptions: ["Қорқыныш", "Ашу", "Реніш", "Кінә", "Ұят", "Жалғыздық", "Дәрменсіздік", "Көңіл қалу"],
                    customOptionPlace: "Өз нұсқаңыз...",
                    analyzeBtn: "Талдауды алу",
                    analyzingText: "Жасанды интеллект сіздің түпкі себебіңізді талдауда...",
                    resultTitle: "Сіздің талдауыңыз",
                    ctaBtn: "Консультацияға жазылу"
                }
            };

            const t = lang ? translations[lang] : translations.ru;

            const handleInputChange = (field, value) => {
                setFormData({ ...formData, [field]: value });
            };

            const toggleEmotion = (emo) => {
                const updated = formData.emotions.includes(emo)
                    ? formData.emotions.filter(e => e !== emo)
                    : [...formData.emotions, emo];
                setFormData({ ...formData, emotions: updated });
            };

            const nextStep = () => {
                if (step === 2 && (!formData.name || !formData.phone)) {
                    alert(lang === 'kz' ? 'Атыңыз бен телефоныңызды толтырыңыз' : 'Пожалуйста, заполните имя и телефон');
                    return;
                }
                setStep(step + 1);
            };
            const prevStep = () => setStep(step - 1);

            const saveToDb = (resultText) => {
                const newRecord = { ...formData, result: resultText, date: new Date().toLocaleString() };
                const updatedDb = [...db, newRecord];
                setDb(updatedDb);
                localStorage.setItem('psychoBotDB', JSON.stringify(updatedDb));
            };

            const fetchWithBackoff = async (url, options, retries = 5) => {
                let delay = 1000;
                for (let i = 0; i <= retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (!response.ok) throw new Error('API Error');
                        return await response.json();
                    } catch (error) {
                        if (i === retries) throw error;
                        await new Promise(res => setTimeout(res, delay));
                        delay *= 2;
                    }
                }
            };

            const generateAIResponse = async () => {
                setIsLoading(true);
                setStep(10);
                
                // твои настройки
                const apiKey = "AIzaSyAeOHBvYPcjdqzXosocusfxJQCHgX4JNWk";
                const model = "gemini-3.1-flash-lite";
                
                const prompt = `проанализируй данные: ${JSON.stringify(formData)}. ответь глубоко, как психолог. язык: ${lang === 'ru' ? 'русский' : 'казахский'}.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    
                    const data = await response.json();
                    
                    if (data.error) {
                        throw new Error(data.error.message);
                    }
                    
                    const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "нет ответа";
                    setAiResult(result);
                    saveToDb(result); // если у тебя есть эта функция, она останется рабочей
                } catch (error) {
                    setAiResult("ошибка: " + error.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const handlePasswordSubmit = () => {
                if (passwordInput === 'kemelgroup2026R') {
                    setShowPasswordModal(false);
                    setShowAdmin(true);
                    setPasswordInput('');
                } else {
                    alert('Неверный пароль!');
                }
            };

            const renderLanguage = () => (
                <div className="flex flex-col items-center justify-center min-h-screen px-6 py-8 fade-in relative">
                    <div className="w-20 h-20 bg-gradient-to-br from-[#007AFF] to-[#0056b3] rounded-[24px] flex items-center justify-center text-white text-3xl shadow-xl shadow-blue-500/20 mb-6 transform hover:scale-105 transition-transform">
                        <i className="fa-solid fa-brain"></i>
                    </div>
                    
                    <div className="text-center space-y-3 mb-6 w-full max-w-sm">
                        <h1 className="text-[20px] font-bold text-[#1D1D1F] tracking-tight leading-snug">
                            Тест для нахождения первопричины проблем (психосоматика)
                        </h1>
                        <h2 className="text-[17px] font-semibold text-gray-500 leading-snug">
                            Мәселелердің түпкі себебін табуға арналған тест (психосоматика)
                        </h2>
                    </div>

                    <div className="w-16 h-[1px] bg-gray-300 my-4"></div>

                    <div className="text-center mb-5 mt-2">
                        <h3 className="text-[18px] font-semibold tracking-tight text-[#1D1D1F]">Выберите язык</h3>
                        <h4 className="text-[14px] text-gray-500 mt-1">Тілді таңдаңыз</h4>
                    </div>

                    <div className="w-full max-w-sm space-y-4">
                        <button onClick={() => { setLang('ru'); setStep(1); }} className="w-full py-4 bg-white border border-gray-200 text-[#1D1D1F] rounded-[20px] font-semibold text-lg hover:bg-gray-50 active:scale-95 transition-all shadow-sm">
                            Русский
                        </button>
                        <button onClick={() => { setLang('kz'); setStep(1); }} className="w-full py-4 bg-white border border-gray-200 text-[#1D1D1F] rounded-[20px] font-semibold text-lg hover:bg-gray-50 active:scale-95 transition-all shadow-sm">
                            Қазақша
                        </button>
                    </div>

                    <button 
                        onClick={() => setShowPasswordModal(true)} 
                        className="absolute bottom-4 text-gray-300 hover:text-gray-400 transition-colors p-4"
                    >
                        <i className="fa-solid fa-lock text-lg"></i>
                    </button>
                </div>
            );

            const renderStep = () => {
                if (step === 0) return renderLanguage();

                return (
                    <div className="flex flex-col h-screen bg-[#F2F2F7] max-w-2xl mx-auto relative fade-in">
                        <div className="pt-12 pb-4 px-6 border-b border-gray-200/50 flex items-center justify-between glass-panel sticky top-0 z-10">
                            {step > 1 && step < 11 ? (
                                <button onClick={prevStep} className="text-[#007AFF] text-[17px] font-medium active:opacity-50 transition-opacity flex items-center">
                                    <i className="fa-solid fa-chevron-left mr-2"></i> Назад
                                </button>
                            ) : <div></div>}
                            <span className="text-sm font-semibold text-gray-400">
                                {step > 1 && step < 10 ? `${step - 1} из 8` : ''}
                            </span>
                        </div>

                        <div className="flex-1 overflow-y-auto px-6 py-8">
                            {step === 1 && (
                                <div className="space-y-6 fade-in h-full flex flex-col justify-center pb-20">
                                    <div className="w-20 h-20 bg-white rounded-[24px] shadow-sm flex items-center justify-center text-[#007AFF] text-3xl mb-4">
                                        <i className="fa-solid fa-feather"></i>
                                    </div>
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.welcomeTitle}</h2>
                                    <p className="text-[#1D1D1F] text-[19px] leading-relaxed font-medium">{t.welcomeDesc}</p>
                                    <p className="text-gray-500 text-[17px] leading-relaxed bg-white p-5 rounded-[20px] shadow-sm">{t.welcomeDetails}</p>
                                </div>
                            )}

                            {step === 2 && (
                                <div className="space-y-6 fade-in">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.contactsTitle}</h2>
                                    <div className="space-y-5 bg-white p-6 rounded-[24px] shadow-sm">
                                        <div>
                                            <label className="block text-[15px] font-semibold text-gray-500 mb-2">{t.nameLabel}</label>
                                            <input type="text" className="ios-input bg-gray-50" value={formData.name} onChange={e => handleInputChange('name', e.target.value)} placeholder="Имя / Есіміңіз"/>
                                        </div>
                                        <div>
                                            <label className="block text-[15px] font-semibold text-gray-500 mb-2">{t.phoneLabel}</label>
                                            <input type="tel" className="ios-input bg-gray-50" value={formData.phone} onChange={e => handleInputChange('phone', e.target.value)} placeholder="+7 (___) ___-__-__"/>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {step === 3 && (
                                <div className="space-y-6 fade-in">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.healthTitle}</h2>
                                    <p className="text-gray-500 text-[17px] leading-relaxed px-1">{t.healthDesc}</p>
                                    <textarea className="ios-input bg-white shadow-sm min-h-[200px] resize-none" value={formData.health} onChange={e => handleInputChange('health', e.target.value)}></textarea>
                                </div>
                            )}

                            {step === 4 && (
                                <div className="space-y-6 fade-in">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.relTitle}</h2>
                                    <p className="text-gray-500 text-[17px] leading-relaxed px-1">{t.relDesc}</p>
                                    <textarea className="ios-input bg-white shadow-sm min-h-[200px] resize-none" value={formData.relationships} onChange={e => handleInputChange('relationships', e.target.value)}></textarea>
                                </div>
                            )}

                            {step === 5 && (
                                <div className="space-y-6 fade-in">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.moneyTitle}</h2>
                                    <p className="text-gray-500 text-[17px] leading-relaxed px-1">{t.moneyDesc}</p>
                                    <textarea className="ios-input bg-white shadow-sm min-h-[200px] resize-none" value={formData.money} onChange={e => handleInputChange('money', e.target.value)}></textarea>
                                </div>
                            )}

                            {step === 6 && (
                                <div className="space-y-6 fade-in">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.selfTitle}</h2>
                                    <p className="text-gray-500 text-[17px] leading-relaxed px-1">{t.selfDesc}</p>
                                    <textarea className="ios-input bg-white shadow-sm min-h-[200px] resize-none" value={formData.selfEsteem} onChange={e => handleInputChange('selfEsteem', e.target.value)}></textarea>
                                </div>
                            )}

                            {step === 7 && (
                                <div className="space-y-6 fade-in pb-10">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.timeTitle}</h2>
                                    <p className="text-gray-500 text-[17px] leading-relaxed px-1">{t.timeDesc}</p>
                                    
                                    <div className="bg-white rounded-[24px] shadow-sm overflow-hidden flex flex-col">
                                        {t.timeOptions.map((opt, index) => (
                                            <button key={opt} 
                                                onClick={() => handleInputChange('time', opt)}
                                                className={`w-full text-left px-6 py-4 font-medium text-[17px] transition-colors flex justify-between items-center
                                                    ${index !== t.timeOptions.length - 1 ? 'border-b border-gray-100' : ''}
                                                    ${formData.time === opt ? 'bg-blue-50/50 text-[#007AFF]' : 'text-[#1D1D1F] hover:bg-gray-50'}
                                                `}>
                                                {opt}
                                                {formData.time === opt && <i className="fa-solid fa-check text-[#007AFF]"></i>}
                                            </button>
                                        ))}
                                    </div>

                                    {(formData.time === 'Свой вариант' || formData.time === 'Өз нұсқам') && (
                                        <div className="fade-in mt-4">
                                            <input type="text" className="ios-input bg-white shadow-sm" placeholder={t.customOptionPlace} value={formData.customTime} onChange={e => handleInputChange('customTime', e.target.value)} />
                                        </div>
                                    )}
                                </div>
                            )}

                            {step === 8 && (
                                <div className="space-y-6 fade-in">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.situationTitle}</h2>
                                    <p className="text-gray-500 text-[17px] leading-relaxed px-1">{t.situationDesc}</p>
                                    <textarea className="ios-input bg-white shadow-sm min-h-[200px] resize-none" value={formData.situation} onChange={e => handleInputChange('situation', e.target.value)}></textarea>
                                </div>
                            )}

                            {step === 9 && (
                                <div className="space-y-6 fade-in pb-20">
                                    <h2 className="text-[28px] font-bold text-[#1D1D1F] tracking-tight">{t.emotionsTitle}</h2>
                                    <p className="text-gray-500 text-[17px] leading-relaxed px-1">{t.emotionsDesc}</p>
                                    <div className="flex flex-wrap gap-3 mb-4">
                                        {t.emotionOptions.map(emo => (
                                            <button key={emo} 
                                                onClick={() => toggleEmotion(emo)}
                                                className={`px-5 py-3 rounded-full font-medium transition-all shadow-sm border ${formData.emotions.includes(emo) ? 'bg-[#007AFF] text-white border-[#007AFF]' : 'bg-white text-[#1D1D1F] border-transparent hover:border-gray-200'}`}>
                                                {emo}
                                            </button>
                                        ))}
                                    </div>
                                    <input type="text" className="ios-input bg-white shadow-sm" placeholder={t.customOptionPlace} value={formData.customEmotion} onChange={e => handleInputChange('customEmotion', e.target.value)} />
                                </div>
                            )}
                        </div>

                        {step > 0 && step < 10 && (
                            <div className="p-6 glass-panel border-t border-gray-200/50 pb-8 absolute bottom-0 left-0 right-0 z-20">
                                <button 
                                    onClick={step === 9 ? generateAIResponse : nextStep} 
                                    className="w-full py-4 bg-[#007AFF] text-white rounded-[20px] font-semibold text-[17px] active:scale-95 transition-transform shadow-lg shadow-blue-500/30 flex justify-center items-center">
                                    {step === 9 ? t.analyzeBtn : (step === 1 ? t.startBtn : t.nextBtn)}
                                </button>
                            </div>
                        )}
                        
                        {step === 10 && isLoading && (
                            <div className="absolute inset-0 bg-[#F2F2F7] z-50 flex flex-col items-center justify-center space-y-8 fade-in">
                                <div className="w-16 h-16 border-4 border-gray-200 border-t-[#007AFF] rounded-full animate-spin"></div>
                                <p className="text-[17px] text-gray-500 font-medium animate-pulse text-center px-8">{t.analyzingText}</p>
                            </div>
                        )}

                        {step === 10 && !isLoading && aiResult && (
                            <div className="absolute inset-0 bg-[#F2F2F7] z-40 flex flex-col fade-in">
                                <div className="pt-14 pb-4 px-6 border-b border-gray-200/50 glass-panel sticky top-0 z-10 text-center">
                                    <h2 className="text-[20px] font-bold text-[#1D1D1F] tracking-tight">{t.resultTitle}</h2>
                                    <p className="text-[15px] text-gray-500 font-medium mt-1">{formData.name}</p>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto px-4 pt-6 pb-40">
                                    <div className="bg-white rounded-[24px] p-6 shadow-sm markdown-body" dangerouslySetInnerHTML={{ __html: marked.parse(aiResult) }}></div>
                                </div>

                                <div className="absolute bottom-0 left-0 right-0 p-6 glass-panel border-t border-gray-200/50 pb-8 z-20">
                                    <a href={`https://wa.me/${WHATSAPP_NUMBER}`} target="_blank" rel="noopener noreferrer" 
                                       className="flex flex-row items-center justify-center w-full py-4 bg-[#34C759] text-white rounded-[20px] font-semibold text-[17px] active:scale-95 transition-transform shadow-lg shadow-green-500/30">
                                        <i className="fa-brands fa-whatsapp text-[22px] mr-2"></i>
                                        <span>{t.ctaBtn}</span>
                                    </a>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            if (showAdmin) {
                return (
                    <div className="min-h-screen bg-gray-900 text-white p-6 fade-in">
                        <div className="flex justify-between items-center mb-8">
                            <h1 className="text-2xl font-bold">База данных анкет</h1>
                            <button onClick={() => setShowAdmin(false)} className="px-4 py-2 bg-gray-800 rounded-lg text-sm">Выйти</button>
                        </div>
                        {db.length === 0 ? (
                            <p className="text-gray-400">Нет данных</p>
                        ) : (
                            <div className="space-y-6">
                                {db.slice().reverse().map((record, index) => (
                                    <div key={index} className="bg-gray-800 rounded-xl p-5 border border-gray-700">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <h3 className="text-lg font-bold">{record.name}</h3>
                                                <p className="text-green-400 font-mono mt-1">{record.phone}</p>
                                            </div>
                                            <span className="text-xs text-gray-500">{record.date}</span>
                                        </div>
                                        <div className="grid grid-cols-1 gap-2 text-sm text-gray-300 mb-4">
                                            <p><span className="text-gray-500">Здоровье:</span> {record.health}</p>
                                            <p><span className="text-gray-500">Отношения:</span> {record.relationships}</p>
                                            <p><span className="text-gray-500">Деньги:</span> {record.money}</p>
                                            <p><span className="text-gray-500">Самооценка/Дух:</span> {record.selfEsteem}</p>
                                            <p><span className="text-gray-500">Давность:</span> {record.time === 'Свой вариант' || record.time === 'Өз нұсқам' ? record.customTime : record.time}</p>
                                            <p><span className="text-gray-500">Ситуация:</span> {record.situation}</p>
                                            <p><span className="text-gray-500">Эмоции:</span> {record.emotions.join(', ')} {record.customEmotion}</p>
                                        </div>
                                        <div className="mt-4 p-4 bg-gray-900 rounded-lg text-xs text-gray-400 max-h-40 overflow-y-auto">
                                            <strong>Разбор ИИ:</strong><br/>
                                            {record.result.substring(0, 300)}...
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <>
                    {renderStep()}
                    {showPasswordModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                                <h3 className="text-[20px] font-bold text-center mb-4">Вход в админку</h3>
                                <input 
                                    type="password" 
                                    className="ios-input bg-gray-50 w-full mb-4" 
                                    placeholder="Введите пароль"
                                    value={passwordInput}
                                    onChange={e => setPasswordInput(e.target.value)}
                                />
                                <div className="flex space-x-3">
                                    <button onClick={() => setShowPasswordModal(false)} className="flex-1 py-3 bg-gray-100 rounded-xl font-semibold text-gray-600">Отмена</button>
                                    <button onClick={handlePasswordSubmit} className="flex-1 py-3 bg-[#007AFF] text-white rounded-xl font-semibold shadow-md shadow-blue-500/20">Войти</button>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
